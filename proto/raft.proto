syntax = "proto3";
package nanodb.raft;

service RaftService {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes command = 3;
}

message RequestVoteRequest {
  uint64 term = 1;
  int32 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  int32 leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
}

// Sent by a leader to a follower that has fallen so far behind that
// the leader has already compacted the entries the follower needs.
// The follower installs the snapshot as its new state machine state
// and then resumes normal AppendEntries replication for any entries
// after last_included_index.
message InstallSnapshotRequest {
  uint64 term = 1;
  int32 leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes data = 5;  // serialized state machine snapshot (coordinator: JSON shard topology)
}

message InstallSnapshotResponse {
  uint64 term = 1;
}
