services:
  shard-0-replica-0:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.distributed
      target: shard_node
    environment:
      - NANODB_SHARD_ID=0
      - NANODB_GRPC_PORT=9090
      - NANODB_DATA_DIR=/app/data
    volumes:
      - shard-0-replica-0-data:/app/data

  shard-0-replica-1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.distributed
      target: shard_node
    environment:
      - NANODB_SHARD_ID=0
      - NANODB_GRPC_PORT=9090
      - NANODB_DATA_DIR=/app/data
    volumes:
      - shard-0-replica-1-data:/app/data

  shard-0-replica-2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.distributed
      target: shard_node
    environment:
      - NANODB_SHARD_ID=0
      - NANODB_GRPC_PORT=9090
      - NANODB_DATA_DIR=/app/data
    volumes:
      - shard-0-replica-2-data:/app/data

  shard-1-replica-0:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.distributed
      target: shard_node
    environment:
      - NANODB_SHARD_ID=1
      - NANODB_GRPC_PORT=9090
      - NANODB_DATA_DIR=/app/data
    volumes:
      - shard-1-replica-0-data:/app/data

  shard-1-replica-1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.distributed
      target: shard_node
    environment:
      - NANODB_SHARD_ID=1
      - NANODB_GRPC_PORT=9090
      - NANODB_DATA_DIR=/app/data
    volumes:
      - shard-1-replica-1-data:/app/data

  shard-1-replica-2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.distributed
      target: shard_node
    environment:
      - NANODB_SHARD_ID=1
      - NANODB_GRPC_PORT=9090
      - NANODB_DATA_DIR=/app/data
    volumes:
      - shard-1-replica-2-data:/app/data

  coordinator-0:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.distributed
      target: coordinator
    environment:
      - NANODB_CLUSTER_CONFIG=/app/config/cluster.docker.json
      - NANODB_HTTP_PORT=8080
      - NANODB_RAFT_NODE_ID=0
      - NANODB_RAFT_PEERS_CONFIG=/app/config/raft_peers.docker.json
      - NANODB_RAFT_STATE_PATH=/app/raft_data/raft_state.bin
      - NANODB_RAFT_LOG_PATH=/app/raft_data/raft_log.bin
    ports:
      - "8080:8080"
    depends_on:
      - shard-0-replica-0
      - shard-0-replica-1
      - shard-0-replica-2
      - shard-1-replica-0
      - shard-1-replica-1
      - shard-1-replica-2
    volumes:
      - ./cluster.docker.json:/app/config/cluster.docker.json:ro
      - ./raft_peers.docker.json:/app/config/raft_peers.docker.json:ro
      - coordinator-0-raft:/app/raft_data

  coordinator-1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.distributed
      target: coordinator
    environment:
      - NANODB_CLUSTER_CONFIG=/app/config/cluster.docker.json
      - NANODB_HTTP_PORT=8080
      - NANODB_RAFT_NODE_ID=1
      - NANODB_RAFT_PEERS_CONFIG=/app/config/raft_peers.docker.json
      - NANODB_RAFT_STATE_PATH=/app/raft_data/raft_state.bin
      - NANODB_RAFT_LOG_PATH=/app/raft_data/raft_log.bin
    depends_on:
      - shard-0-replica-0
      - shard-0-replica-1
      - shard-0-replica-2
      - shard-1-replica-0
      - shard-1-replica-1
      - shard-1-replica-2
    volumes:
      - ./cluster.docker.json:/app/config/cluster.docker.json:ro
      - ./raft_peers.docker.json:/app/config/raft_peers.docker.json:ro
      - coordinator-1-raft:/app/raft_data

  coordinator-2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.distributed
      target: coordinator
    environment:
      - NANODB_CLUSTER_CONFIG=/app/config/cluster.docker.json
      - NANODB_HTTP_PORT=8080
      - NANODB_RAFT_NODE_ID=2
      - NANODB_RAFT_PEERS_CONFIG=/app/config/raft_peers.docker.json
      - NANODB_RAFT_STATE_PATH=/app/raft_data/raft_state.bin
      - NANODB_RAFT_LOG_PATH=/app/raft_data/raft_log.bin
    depends_on:
      - shard-0-replica-0
      - shard-0-replica-1
      - shard-0-replica-2
      - shard-1-replica-0
      - shard-1-replica-1
      - shard-1-replica-2
    volumes:
      - ./cluster.docker.json:/app/config/cluster.docker.json:ro
      - ./raft_peers.docker.json:/app/config/raft_peers.docker.json:ro
      - coordinator-2-raft:/app/raft_data

volumes:
  shard-0-replica-0-data:
  shard-0-replica-1-data:
  shard-0-replica-2-data:
  shard-1-replica-0-data:
  shard-1-replica-1-data:
  shard-1-replica-2-data:
  coordinator-0-raft:
  coordinator-1-raft:
  coordinator-2-raft:
